<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finn Digital — iOS App Studio</title>
    <meta name="description" content="Finn Digital LLC builds iOS apps that solve real problems. 7 apps spanning nature, healthcare, real estate, pets, food safety, color, and photo restoration.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="hero" class="hero">
        <div class="hero-circles">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>
        <div class="hero-content">
            <h1 class="wordmark">FINN<span class="accent">.</span>DIGITAL</h1>
            <p class="subtitle">7 Apps &middot; iOS &middot; Real Solutions</p>
            <div class="app-dots">
                <span class="dot" style="background: var(--color-naturefind)"></span>
                <span class="dot" style="background: var(--color-carefind)"></span>
                <span class="dot" style="background: var(--color-easyrealty)"></span>
                <span class="dot" style="background: var(--color-pettrace)"></span>
                <span class="dot" style="background: var(--color-safeplate)"></span>
                <span class="dot" style="background: var(--color-truehue)"></span>
                <span class="dot" style="background: var(--color-revivo)"></span>
            </div>
        </div>
        <div class="scroll-indicator">&#8595;</div>
    </section>

    <section id="apps" class="apps">
    </section>

    <section id="about" class="about">
    </section>

    <footer id="footer" class="footer">
    </footer>

    <script src="script.js"></script>
</body>
</html>
